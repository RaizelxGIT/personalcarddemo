<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>A Universe of Little Moments</title>
<meta name="theme-color" content="#0B0A08">
<meta property="og:title" content="A little universe, made just for you">
<meta property="og:type" content="website">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg-void:#0B0A08;
  --gold:#C9A25D;
  --wax:#8B2E2E;
  --text:#F3EDE2;
  --text-dim:#9C9284;
  --surface-raised:#1E1A13;
  --serif:'Fraunces', serif;
  --sans:'Manrope', sans-serif;
}
*{ box-sizing:border-box; }
html,body{
  margin:0; height:100%; background:var(--bg-void); overflow:hidden;
  font-family:var(--sans); color:var(--text); -webkit-font-smoothing:antialiased;
}
button{ font:inherit; background:none; border:none; color:inherit; cursor:pointer; }
:focus-visible{ outline:2px solid var(--gold); outline-offset:3px; }

.canvas-container{ position:fixed; inset:0; z-index:0; }
.canvas-container canvas{ display:block; touch-action:none; }
.css2d-container{ position:fixed; inset:0; z-index:1; pointer-events:none; overflow:hidden; }

.planet-label{
  font-family:var(--sans); font-size:11px; letter-spacing:.04em; text-transform:uppercase;
  color:var(--text); background:rgba(11,10,8,.55); padding:4px 10px; border-radius:100px;
  white-space:nowrap; border:1px solid rgba(201,162,93,.3);
  transform:translateY(-50%);
}
.planet-label--center{
  font-family:var(--serif); font-style:italic; font-size:15px;
  background:none; border:none; padding:0; color:var(--gold);
}

/* Floating in-world detail (replaces the old modal) */
.floating-detail{
  opacity:0; transform:translateY(8px) scale(.94);
  transition:opacity .5s ease, transform .5s ease;
  pointer-events:none;
  text-align:center; width:220px;
  background:rgba(11,10,8,.6); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
  border:1px solid rgba(201,162,93,.3); border-radius:14px;
  padding:14px 16px;
}
.floating-detail.is-visible{ opacity:1; transform:translateY(0) scale(1); }
.floating-detail__date{ display:block; font-size:.62rem; letter-spacing:.1em; text-transform:uppercase; color:var(--gold); margin-bottom:4px; }
.floating-detail__title{ font-family:var(--serif); font-size:1.05rem; margin-bottom:6px; line-height:1.2; }
.floating-detail__text{ font-size:.8rem; color:var(--text-dim); line-height:1.5; }

.floating-note{
  opacity:0; transform:translateY(6px) scale(.9);
  transition:opacity .5s ease, transform .5s ease;
  pointer-events:none; text-align:center; width:170px;
  font-family:var(--serif); font-style:italic; font-size:.85rem; line-height:1.35;
  color:var(--text); background:rgba(11,10,8,.5); backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
  border:1px solid rgba(201,162,93,.25); border-radius:12px; padding:10px 12px;
}
.floating-note.is-visible{ opacity:1; transform:translateY(0) scale(1); }

.intro{
  position:fixed; inset:0; z-index:20;
  display:flex; align-items:center; justify-content:center;
  background:var(--bg-void);
  transition:opacity .8s ease;
}
.intro.is-hidden{ opacity:0; pointer-events:none; }
.intro__inner{ text-align:center; padding:24px; max-width:340px; }
.intro__star{
  width:14px; height:14px; border-radius:50%; margin:0 auto 28px;
  background:var(--gold); box-shadow:0 0 20px 6px rgba(201,162,93,.6);
  animation:starPulse 2.2s ease-in-out infinite;
}
@keyframes starPulse{ 0%,100%{ transform:scale(1); opacity:.8; } 50%{ transform:scale(1.4); opacity:1; } }
.intro__eyebrow{ font-size:.72rem; letter-spacing:.24em; text-transform:uppercase; color:var(--gold); margin-bottom:16px; }
.intro__title{ font-family:var(--serif); font-size:clamp(1.8rem,7vw,2.6rem); margin-bottom:14px; line-height:1.15; }
.intro__sub{ color:var(--text-dim); font-size:.95rem; }
@media (prefers-reduced-motion:reduce){ .intro__star{ animation:none; } }

.hud{ position:fixed; inset:0; z-index:10; pointer-events:none; }
.hud__home{
  position:absolute; top:20px; left:20px; pointer-events:auto;
  width:44px; height:44px; border-radius:50%;
  background:rgba(23,20,15,.7); border:1px solid rgba(201,162,93,.3);
  display:flex; align-items:center; justify-content:center; font-size:1.1rem; color:var(--gold);
}
.hud__hint{
  position:absolute; bottom:24px; left:50%; transform:translateX(-50%);
  font-size:.72rem; letter-spacing:.06em; color:var(--text-dim);
  background:rgba(23,20,15,.6); padding:8px 16px; border-radius:100px;
  white-space:nowrap;
}

.fallback{
  position:fixed; inset:0; z-index:9999; display:flex; align-items:center; justify-content:center;
  text-align:center; padding:32px; background:var(--bg-void); color:var(--text); font-family:var(--sans);
}
</style>
</head>
<body>

<div id="canvas-container" class="canvas-container"></div>
<div id="css2d-container" class="css2d-container"></div>

<div id="intro" class="intro">
  <div class="intro__inner">
    <button id="introButton" class="intro__star" aria-label="Begin"></button>
    <p id="introEyebrow" class="intro__eyebrow"></p>
    <h1 id="introTitle" class="intro__title"></h1>
    <p id="introSub" class="intro__sub"></p>
  </div>
</div>

<div id="hud" class="hud" hidden>
  <button id="homeButton" class="hud__home" aria-label="Back to overview">⌂</button>
  <p id="hudHint" class="hud__hint"></p>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script>
/* ============================================================
   HOW TO CUSTOMIZE THIS TEMPLATE FOR A NEW ORDER
   Edit ONLY the values below.

   1. NAMES        — recipientName, fromName, centerLabel
   2. INTRO TEXT   — introEyebrow, introTitle, introSub
   3. MEMORIES     — memories[] — each becomes a photo-planet.
                      title/date/text/photo, plus optional color (hex).
   4. NOTES        — notes[] — short one-liners that float around the
                      core (tap the center of the galaxy to see them).
   5. COLORS       — colors object

   This file needs an internet connection to load Three.js from its
   CDN, same as the Google Font above.
   ============================================================ */
window.CONFIG = {
  recipientName: "James",
  fromName: "Tessa",
  centerLabel: "Tessa & James",

  introEyebrow: "A UNIVERSE OF LITTLE MOMENTS",
  introTitle: "Made for you, James.",
  introSub: "Tap the star to begin.",
  hudHint: "drag to explore · tap a memory or the core",

  memories: [
    { title: "How it started", date: "Sept 2023", text: "A random comment in a group chat turned into three hours of talking. Neither of us noticed the time.", photo: "https://picsum.photos/seed/galaxy1/600/600", color: "#C9A25D" },
    { title: "First real hangout", date: "Nov 2023", text: "That spot near Yaba. You laughed at my jokes — even the bad ones.", photo: "https://picsum.photos/seed/galaxy2/600/600", color: "#8B2E2E" },
    { title: "Lekki, just because", date: "Dec 2023", text: "No occasion, no plan. I just wanted to see the water with you.", photo: "https://picsum.photos/seed/galaxy3/600/600", color: "#C9A25D" },
    { title: "Your last birthday", date: "Jul 2025", text: "First time I got to make your day feel the way you make mine feel, all the time.", photo: "https://picsum.photos/seed/galaxy4/600/600", color: "#8B2E2E" },
    { title: "The quiet Tuesday", date: "Mar 2026", text: "Nothing happened. It's still one of my favorite days.", photo: "https://picsum.photos/seed/galaxy5/600/600", color: "#C9A25D" },
    { title: "Right now", date: "Jul 2026", text: "Still here. Still choosing this — choosing you.", photo: "https://picsum.photos/seed/galaxy6/600/600", color: "#8B2E2E" }
  ],

  notes: [
    "You make ordinary Tuesdays feel like something.",
    "Still not over how you laugh at your own jokes first.",
    "This took longer than it should have. Worth it.",
    "Reminder: you are, in fact, that important.",
    "You are the softest place I know.",
    "Some people are just... home. You're that."
  ],

  colors: {
    bgVoid: "#0B0A08",
    gold: "#C9A25D",
    wax: "#8B2E2E",
    text: "#F3EDE2",
    textDim: "#9C9284"
  }
};
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

try {
  const CONFIG = window.CONFIG;
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function hexToRgb(hex){
    const clean = String(hex).replace('#', '');
    const num = parseInt(clean, 16) || 0;
    return { r: (num >> 16) & 255, g: (num >> 8) & 255, b: num & 255 };
  }
  function escapeHtml(str){
    return String(str == null ? '' : str).replace(/[&<>"']/g, function(ch){
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[ch];
    });
  }

  // ---------- renderer + label renderer ----------
  const canvasContainer = document.getElementById('canvas-container');
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  canvasContainer.appendChild(renderer.domElement);

  const labelRenderer = new CSS2DRenderer();
  labelRenderer.setSize(window.innerWidth, window.innerHeight);
  labelRenderer.domElement.style.position = 'absolute';
  labelRenderer.domElement.style.top = '0';
  labelRenderer.domElement.style.pointerEvents = 'none';
  document.getElementById('css2d-container').appendChild(labelRenderer.domElement);

  // ---------- scene + camera ----------
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(CONFIG.colors.bgVoid);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 3000);
  camera.position.set(0, 100, 420);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.minDistance = 15;
  controls.maxDistance = 500;
  controls.target.set(0, 0, 0);
  controls.autoRotate = !reduceMotion;
  controls.autoRotateSpeed = 0.35;

  // ---------- galaxy disk (spiral arms, shader-based twinkle + color) ----------
  let galaxyMaterial = null;
  function createGalaxyDisk(count, maxRadius, arms){
    const positions = new Float32Array(count * 3);
    const colorsArr = new Float32Array(count * 3);
    const sizes = new Float32Array(count);
    const phases = new Float32Array(count);

    const colorInner = new THREE.Color(CONFIG.colors.gold);
    const colorOuter = new THREE.Color(CONFIG.colors.text);

    for (let i = 0; i < count; i++){
      const t = Math.random();
      const arm = i % arms;
      const armOffset = (arm / arms) * Math.PI * 2;
      const spiralAngle = t * Math.PI * 2.4 + armOffset;
      const scatter = (1 - t) * 0.2 + 0.06;
      const angle = spiralAngle + (Math.random() - 0.5) * scatter;
      const radius = t * maxRadius + (Math.random() - 0.5) * maxRadius * 0.05;

      const x = Math.cos(angle) * radius;
      const z = Math.sin(angle) * radius;
      const y = (Math.random() - 0.5) * (1.5 + t * 5);

      positions[i * 3] = x; positions[i * 3 + 1] = y; positions[i * 3 + 2] = z;

      const mixed = colorInner.clone().lerp(colorOuter, Math.min(t * 1.3, 1));
      colorsArr[i * 3] = mixed.r; colorsArr[i * 3 + 1] = mixed.g; colorsArr[i * 3 + 2] = mixed.b;

      sizes[i] = 1.0 + Math.random() * 2.4;
      phases[i] = Math.random() * Math.PI * 2;
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('aColor', new THREE.BufferAttribute(colorsArr, 3));
    geo.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
    geo.setAttribute('aPhase', new THREE.BufferAttribute(phases, 1));

    galaxyMaterial = new THREE.ShaderMaterial({
      uniforms: {
        uTime: { value: 0 },
        uPixelRatio: { value: Math.min(window.devicePixelRatio || 1, 2) }
      },
      vertexShader: [
        'attribute float aSize;',
        'attribute float aPhase;',
        'attribute vec3 aColor;',
        'varying vec3 vColor;',
        'varying float vPhase;',
        'uniform float uPixelRatio;',
        'void main(){',
        '  vColor = aColor;',
        '  vPhase = aPhase;',
        '  vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);',
        '  gl_Position = projectionMatrix * mvPosition;',
        '  gl_PointSize = aSize * uPixelRatio * (220.0 / -mvPosition.z);',
        '}'
      ].join('\n'),
      fragmentShader: [
        'uniform float uTime;',
        'varying vec3 vColor;',
        'varying float vPhase;',
        'void main(){',
        '  vec2 uv = gl_PointCoord - vec2(0.5);',
        '  float dist = length(uv);',
        '  if (dist > 0.5) discard;',
        '  float twinkle = 0.55 + 0.45 * sin(uTime * 1.6 + vPhase * 6.2831853);',
        '  float falloff = 1.0 - smoothstep(0.0, 0.5, dist);',
        '  gl_FragColor = vec4(vColor, falloff * twinkle);',
        '}'
      ].join('\n'),
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    });

    return new THREE.Points(geo, galaxyMaterial);
  }
  scene.add(createGalaxyDisk(reduceMotion ? 3500 : 7000, 260, 4));

  // ---------- distant halo stars (simple, sparse, background depth) ----------
  function createHalo(count, radius){
    const positions = new Float32Array(count * 3);
    for (let i = 0; i < count; i++){
      const r = radius * (0.7 + Math.random() * 0.3);
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos((Math.random() * 2) - 1);
      positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
      positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
      positions[i * 3 + 2] = r * Math.cos(phi);
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const mat = new THREE.PointsMaterial({
      color: CONFIG.colors.text, size: 1.1, sizeAttenuation: true, transparent: true, opacity: 0.5
    });
    return new THREE.Points(geo, mat);
  }
  scene.add(createHalo(2000, 700));

  // ---------- nebula: multi-blob composite texture for an organic look ----------
  function makeNebulaTexture(hexList){
    const size = 512;
    const c = document.createElement('canvas');
    c.width = c.height = size;
    const ctx = c.getContext('2d');
    ctx.globalCompositeOperation = 'lighter';
    const blobCount = 5 + Math.floor(Math.random() * 4);
    for (let i = 0; i < blobCount; i++){
      const hex = hexList[Math.floor(Math.random() * hexList.length)];
      const { r, g, b } = hexToRgb(hex);
      const bx = size * 0.5 + (Math.random() - 0.5) * size * 0.5;
      const by = size * 0.5 + (Math.random() - 0.5) * size * 0.5;
      const br = size * (0.16 + Math.random() * 0.2);
      const grad = ctx.createRadialGradient(bx, by, 0, bx, by, br);
      const alpha = 0.3 + Math.random() * 0.25;
      grad.addColorStop(0, 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')');
      grad.addColorStop(1, 'rgba(' + r + ',' + g + ',' + b + ',0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(bx, by, br, 0, Math.PI * 2);
      ctx.fill();
    }
    const tex = new THREE.CanvasTexture(c);
    tex.needsUpdate = true;
    return tex;
  }

  const nebulaGroup = new THREE.Group();
  for (let i = 0; i < 5; i++){
    const tex = makeNebulaTexture([CONFIG.colors.gold, CONFIG.colors.wax]);
    const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0.45, blending: THREE.AdditiveBlending, depthWrite: false });
    const sprite = new THREE.Sprite(mat);
    const scale = 200 + Math.random() * 160;
    sprite.scale.set(scale, scale, 1);
    const angle = (i / 5) * Math.PI * 2 + Math.random() * 0.6;
    const dist = 150 + Math.random() * 130;
    sprite.position.set(Math.cos(angle) * dist, (Math.random() - 0.5) * 90, Math.sin(angle) * dist);
    nebulaGroup.add(sprite);
  }
  scene.add(nebulaGroup);

  // ---------- dust lane: a flat plane lying IN the galaxy plane (not a billboard) ----------
  function makeDustTexture(){
    const w = 512, h = 128;
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    const ctx = c.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, 'rgba(5,4,3,0)');
    grad.addColorStop(0.5, 'rgba(5,4,3,0.55)');
    grad.addColorStop(1, 'rgba(5,4,3,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);
    const tex = new THREE.CanvasTexture(c);
    tex.needsUpdate = true;
    return tex;
  }
  const dust = new THREE.Mesh(
    new THREE.PlaneGeometry(300, 70),
    new THREE.MeshBasicMaterial({ map: makeDustTexture(), transparent: true, opacity: 0.5, depthWrite: false, side: THREE.DoubleSide })
  );
  dust.rotation.x = -Math.PI / 2;
  dust.position.y = 0.4;
  scene.add(dust);

  // ---------- central core (tap = notes) ----------
  function makeGlowTexture(hex){
    const { r, g, b } = hexToRgb(hex);
    const size = 256;
    const c = document.createElement('canvas');
    c.width = c.height = size;
    const ctx = c.getContext('2d');
    const grad = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
    grad.addColorStop(0, 'rgba(' + r + ',' + g + ',' + b + ',0.9)');
    grad.addColorStop(0.4, 'rgba(' + r + ',' + g + ',' + b + ',0.35)');
    grad.addColorStop(1, 'rgba(' + r + ',' + g + ',' + b + ',0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, size, size);
    const tex = new THREE.CanvasTexture(c);
    tex.needsUpdate = true;
    return tex;
  }

  const coreGlow = new THREE.Sprite(new THREE.SpriteMaterial({
    map: makeGlowTexture(CONFIG.colors.gold), transparent: true, opacity: 0.85, blending: THREE.AdditiveBlending, depthWrite: false
  }));
  coreGlow.scale.set(46, 46, 1);
  scene.add(coreGlow);

  const core = new THREE.Mesh(
    new THREE.SphereGeometry(3, 32, 32),
    new THREE.MeshBasicMaterial({ color: CONFIG.colors.gold })
  );
  core.userData = { type: 'core' };
  scene.add(core);

  const centerLabelDiv = document.createElement('div');
  centerLabelDiv.className = 'planet-label planet-label--center';
  centerLabelDiv.textContent = CONFIG.centerLabel;
  const centerLabelObj = new CSS2DObject(centerLabelDiv);
  centerLabelObj.position.set(0, 8, 0);
  core.add(centerLabelObj);

  // notes float in a small ring around the core
  const noteDivs = [];
  CONFIG.notes.forEach(function(noteText, i){
    const angle = (i / CONFIG.notes.length) * Math.PI * 2;
    const r = 9 + (i % 2) * 3.5;
    const nx = Math.cos(angle) * r;
    const nz = Math.sin(angle) * r;
    const ny = Math.sin(i * 1.3) * 2.4;

    const orb = new THREE.Mesh(
      new THREE.SphereGeometry(0.45, 12, 12),
      new THREE.MeshBasicMaterial({ color: CONFIG.colors.gold })
    );
    orb.position.set(nx, ny, nz);
    core.add(orb);

    const noteDiv = document.createElement('div');
    noteDiv.className = 'floating-note';
    noteDiv.textContent = noteText;
    const noteObj = new CSS2DObject(noteDiv);
    noteObj.position.set(0, 1.4, 0);
    orb.add(noteObj);

    noteDivs.push(noteDiv);
  });

  // ---------- planets (photo-textured spheres) ----------
  const textureLoader = new THREE.TextureLoader();
  textureLoader.setCrossOrigin('anonymous');

  const planets = [];
  const raycastTargets = [core];
  const goldenAngle = Math.PI * (3 - Math.sqrt(5));

  CONFIG.memories.forEach(function(mem, i){
    const angle = i * goldenAngle;
    const radius = 26 + i * 10;
    const baseY = Math.sin(i * 0.7) * 6;
    const x = Math.cos(angle) * radius;
    const z = Math.sin(angle) * radius;
    const color = mem.color || CONFIG.colors.gold;

    const planetMat = new THREE.MeshBasicMaterial({ color: color });
    const planet = new THREE.Mesh(new THREE.SphereGeometry(2.6, 32, 32), planetMat);
    planet.position.set(x, baseY, z);
    planet.userData = { type: 'planet', index: i, baseY: baseY, phase: Math.random() * Math.PI * 2 };
    scene.add(planet);
    raycastTargets.push(planet);

    if (mem.photo){
      textureLoader.load(mem.photo, function(tex){
        planetMat.map = tex;
        planetMat.color.set(0xffffff);
        planetMat.needsUpdate = true;
      }, undefined, function(err){
        console.warn('Could not load photo for planet ' + i + ' — it will stay a plain color sphere.', err);
      });
    }

    const haloTex = makeGlowTexture(color);
    const halo = new THREE.Sprite(new THREE.SpriteMaterial({ map: haloTex, transparent: true, opacity: 0.55, blending: THREE.AdditiveBlending, depthWrite: false }));
    halo.scale.set(15, 15, 1);
    planet.add(halo);

    const labelDiv = document.createElement('div');
    labelDiv.className = 'planet-label';
    labelDiv.textContent = mem.title;
    const labelObj = new CSS2DObject(labelDiv);
    labelObj.position.set(0, 4.4, 0);
    planet.add(labelObj);

    const detailDiv = document.createElement('div');
    detailDiv.className = 'floating-detail';
    detailDiv.innerHTML =
      '<span class="floating-detail__date">' + escapeHtml(mem.date || '') + '</span>' +
      '<h3 class="floating-detail__title">' + escapeHtml(mem.title) + '</h3>' +
      '<p class="floating-detail__text">' + escapeHtml(mem.text || '') + '</p>';
    const detailObj = new CSS2DObject(detailDiv);
    detailObj.position.set(0, 7, 0);
    planet.add(detailObj);
    planet.userData.detailDiv = detailDiv;

    planets.push(planet);
  });

  // ---------- camera animation ----------
  let cameraAnim = null;
  function animateCamera(toPos, toTarget, duration){
    if (reduceMotion) duration = 0;
    const fromPos = camera.position.clone();
    const fromTarget = controls.target.clone();
    const start = performance.now();
    controls.enabled = false;

    function step(now){
      const t = duration <= 0 ? 1 : Math.min((now - start) / duration, 1);
      const eased = 1 - Math.pow(1 - t, 3);
      camera.position.lerpVectors(fromPos, toPos, eased);
      controls.target.lerpVectors(fromTarget, toTarget, eased);
      controls.update();
      if (t < 1){
        cameraAnim = requestAnimationFrame(step);
      } else {
        controls.enabled = true;
        cameraAnim = null;
      }
    }
    if (cameraAnim) cancelAnimationFrame(cameraAnim);
    cameraAnim = requestAnimationFrame(step);
  }

  const overviewPos = new THREE.Vector3(0, 45, 150);
  const overviewTarget = new THREE.Vector3(0, 0, 0);
  let focusedType = null;
  let focusedIndex = null;

  function hideAllFloatingDetails(){
    planets.forEach(function(p){ p.userData.detailDiv.classList.remove('is-visible'); });
    noteDivs.forEach(function(d){ d.classList.remove('is-visible'); });
  }

  function focusOnPlanet(index){
    if (focusedType === 'planet' && focusedIndex === index){ returnToOverview(); return; }
    hideAllFloatingDetails();
    focusedType = 'planet';
    focusedIndex = index;

    const planet = planets[index];
    const targetPos = planet.position.clone();
    const dir = targetPos.clone().normalize().multiplyScalar(9);
    const newCamPos = targetPos.clone().add(dir).add(new THREE.Vector3(0, 3, 0));

    controls.autoRotate = false;
    animateCamera(newCamPos, targetPos, 1100);
    planet.userData.detailDiv.classList.add('is-visible');
  }

  function focusOnCore(){
    if (focusedType === 'core'){ returnToOverview(); return; }
    hideAllFloatingDetails();
    focusedType = 'core';
    focusedIndex = null;

    controls.autoRotate = false;
    animateCamera(new THREE.Vector3(0, 11, 27), new THREE.Vector3(0, 0, 0), 1100);
    noteDivs.forEach(function(d){ d.classList.add('is-visible'); });
  }

  function returnToOverview(){
    hideAllFloatingDetails();
    focusedType = null;
    focusedIndex = null;
    controls.autoRotate = !reduceMotion;
    animateCamera(overviewPos, overviewTarget, 1100);
  }

  // ---------- pointer interaction (tap; ignore drags) ----------
  const raycaster = new THREE.Raycaster();
  const pointer = new THREE.Vector2();
  let downPos = null;

  renderer.domElement.addEventListener('pointerdown', function(e){
    downPos = { x: e.clientX, y: e.clientY };
  });
  renderer.domElement.addEventListener('pointerup', function(e){
    if (!downPos) return;
    const dx = e.clientX - downPos.x;
    const dy = e.clientY - downPos.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    downPos = null;
    if (dist > 6) return;

    pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
    pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(pointer, camera);
    const hits = raycaster.intersectObjects(raycastTargets);
    if (hits.length > 0){
      const obj = hits[0].object;
      if (obj.userData.type === 'planet') focusOnPlanet(obj.userData.index);
      else if (obj.userData.type === 'core') focusOnCore();
    } else if (focusedType !== null){
      returnToOverview();
    }
  });

  // ---------- UI wiring ----------
  document.getElementById('introEyebrow').textContent = CONFIG.introEyebrow;
  document.getElementById('introTitle').textContent = CONFIG.introTitle;
  document.getElementById('introSub').textContent = CONFIG.introSub;
  document.getElementById('hudHint').textContent = CONFIG.hudHint;

  document.getElementById('introButton').addEventListener('click', function(){
    document.getElementById('intro').classList.add('is-hidden');
    document.getElementById('hud').hidden = false;
    animateCamera(overviewPos, overviewTarget, reduceMotion ? 0 : 2000);
  });
  document.getElementById('homeButton').addEventListener('click', returnToOverview);

  window.addEventListener('resize', function(){
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ---------- render loop ----------
  function animate(){
    requestAnimationFrame(animate);
    controls.update();

    const t = performance.now() * 0.001;
    if (galaxyMaterial) galaxyMaterial.uniforms.uTime.value = t;

    if (!reduceMotion){
      planets.forEach(function(p){
        p.position.y = p.userData.baseY + Math.sin(t * 0.5 + p.userData.phase) * 1.2;
      });
      nebulaGroup.rotation.y += 0.0004;
    }

    renderer.render(scene, camera);
    labelRenderer.render(scene, camera);
  }
  animate();

} catch (err){
  console.error('Galaxy experience failed to load:', err);
  document.body.innerHTML = '<div class="fallback">Something went wrong loading the experience. Check your internet connection (this page needs it to load the 3D library) and try refreshing.</div>';
}
</script>

</body>
</html>
